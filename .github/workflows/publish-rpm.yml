name: Publish RPM package

on:
  repository_dispatch:
    types: [package-published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "smfc release tag"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: write

    steps:
      - name: Install dependencies
        run: dnf install -y createrepo_c rpm-sign gnupg2 git gh

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.REPO_SIGNING_GPG_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Configure RPM signing macros
        run: |
          cat > ~/.rpmmacros << 'EOF'
          %_gpg_name 9E06E863D50D7541
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} gpg --no-verbose --no-armor --batch --pinentry-mode loopback --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          EOF

      - name: Resolve release tag
        id: tag
        run: echo "value=${{ github.event.client_payload.release_tag || inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Download .rpm from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/in
          gh release download "${{ steps.tag.outputs.value }}" -R petersulyok/smfc -p '*.rpm' -D /tmp/in

      - name: Bootstrap gh-pages content
        run: |
          if [ ! -f smfc-repo.gpg ]; then
            git show origin/main:smfc-repo.gpg > smfc-repo.gpg
          fi
          if [ ! -f smfc.repo ]; then
            git show origin/main:smfc.repo > smfc.repo
          fi
          mkdir -p packages

      - name: Sign and add package to repository
        run: |
          cp /tmp/in/*.rpm packages/
          rpm --addsign packages/*.rpm
          createrepo_c --update .
          gpg --batch --yes --detach-sign --armor repodata/repomd.xml

      - name: Commit and push gh-pages
        run: |
          git config user.name "smfc-bot"
          git config user.email "smfc-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Publish ${{ steps.tag.outputs.value }}"
          git push origin gh-pages